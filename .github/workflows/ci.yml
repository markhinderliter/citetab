name: ci

# The single quality gate: CI runs scripts/check.sh
# (ruff + ruff format --check + mypy --strict + pytest/coverage) — the same
# script a contributor runs locally, with one deliberate difference: tests
# marked @pytest.mark.calibrated are deselected here. They assert specific
# measured page numbers / pagination-derived finding sets that only hold on the
# fixture-generating machine; a stock runner's LibreOffice + fonts paginate
# differently, so those run LOCALLY ONLY (the conftest hook keys on the CI env
# var, which GitHub Actions sets automatically). LibreOffice is still installed
# so the portable (environment-independent) render-backed tests still exercise.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LibreOffice (system dependency for page measurement)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice fontconfig

      - name: Install citetab with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quality gates
        run: ./scripts/check.sh
