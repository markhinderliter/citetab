# .github/workflows/build-windows.yml
#
# Builds the citetab Windows onedir bundle on a GitHub-hosted Windows runner
# (PyInstaller can't cross-compile, so this is how we get a real .exe without
# owning a Windows build machine). Produces a downloadable artifact you then
# double-click-test on a real Windows box.

name: Build Windows app

# Manual trigger only: build when you actually want a Windows artifact, not on
# every commit. Keeps Actions-minute usage near zero.
#
# NOTE: the "Run workflow" button only appears once this file exists on your
# repository's DEFAULT branch. See the explanation in chat for how to handle
# that while the freeze work is still on feature/desktop-app.
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # matches the interpreter the freeze was proven on

      - name: Install citetab and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller==6.21.0   # pinned to the version used for the Linux proof-build

      - name: Build the onedir bundle
        run: pyinstaller freeze/citetab.spec
        # Produces dist/citetab/ — the same spec validated on Linux; on Windows
        # PyInstaller picks up the Windows Tcl/Tk, .pyd extensions, etc. automatically.

      - name: Upload the Windows build as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: citetab-windows-onedir
          path: dist/citetab/
          retention-days: 14
        # The onedir is kept as a debugging artifact (extract + run citetab.exe
        # directly, no install). The setup.exe below is the actual deliverable.

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        # Chocolatey is preinstalled on windows-latest. Installing Inno explicitly
        # (rather than relying on the runner image happening to ship it) pins the
        # installer toolchain. ISCC.exe lands at the standard Program Files (x86)
        # path used in the next step.

      - name: Build the Windows installer (setup.exe)
        shell: pwsh
        run: |
          $ver = (python -c "import citetab, sys; sys.stdout.write(citetab.__version__)")
          Write-Host "Packaging citetab $ver"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver freeze\citetab.iss
        # Sources the version from the installed package (single source of truth),
        # injects it into the .iss, and compiles dist\citetab\ (built above) into
        # dist\installer\citetab-setup.exe. UNSIGNED (signing deferred).

      - name: Upload the installer as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: citetab-windows-installer
          path: dist/installer/citetab-setup.exe
          retention-days: 14
        # The deliverable: download, run on Windows, install, launch from the
        # Start menu. UNSIGNED — SmartScreen will warn until code signing lands.
